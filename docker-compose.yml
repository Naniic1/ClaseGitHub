 services:
  db:
    image: postgres:16-alpine
    container_name: gestionstock-postgres
    environment:
      POSTGRES_DB: gestionstockdb
      POSTGRES_USER: gestionadmin
      POSTGRES_PASSWORD: Haasten2025!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gestionadmin -d gestionstockdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gestionstock-backend
    
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_USERNAME=gestionadmin
      - SPRING_DATASOURCE_PASSWORD=Haasten2025!
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: gestionstock-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

 volumes:
  postgres_data:
